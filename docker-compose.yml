networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

services:
  backend:
    dns: 8.8.8.8
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        NPM_REGISTRY: https://registry.npmjs.org
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
    volumes:
      - ./backend/src:/app/src
    command: ["npx", "tsx", "watch", "src/index.ts"]

  frontend:
    dns: 8.8.8.8
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_PROXY_TARGET=http://backend:3000
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
    depends_on:
      - backend
